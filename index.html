<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Juan Snacks | Jalisco</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <h1>San Juan Snacks</h1>
            </div>
            <p class="location">San Juan de los Lagos, Jalisco</p>
        </header>

        <!-- Menú móvil -->
        <div class="mobile-menu-toggle">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
                <span>Categorías</span>
            </button>
        </div>

        <!-- Filtros -->
        <div class="filters-container">
            <div class="filters" id="filtersMenu">
                <button class="filter-btn active" data-filter="all">
                    <i class="fas fa-utensils"></i> Todos
                </button>
                <button class="filter-btn" data-filter="picantes">
                    <i class="fas fa-fire"></i> Picantes
                </button>
                <button class="filter-btn" data-filter="frescos">
                    <i class="fas fa-lemon"></i> Frescos
                </button>
                <button class="filter-btn" data-filter="dulces">
                    <i class="fas fa-cookie"></i> Dulces
                </button>
                <button class="filter-btn" data-filter="tacos">
                    <i class="fas fa-taco"></i> Tacos
                </button>
                <button class="filter-btn" data-filter="leches">
                    <i class="fas fa-mug-hot"></i> Leches
                </button>
            </div>
        </div>

        <!-- Grid de productos -->
        <main class="products-grid" id="productsGrid">
            <!-- Los productos se generan automáticamente con JavaScript -->
        </main>

        <footer class="contact">
            <div class="contact-info">
                <i class="fas fa-phone"></i>
                <span>(52) 395-102-4699</span>
            </div>
            <div class="delivery">Entrega gratis en San Juan a partir de $80</div>
        </footer>
    </div>

    <!-- ==================== MODAL DE PERSONALIZACIÓN ==================== -->
    <div class="modal" id="optionsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalProductName">Nombre del Producto</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            
            <div class="modal-body" id="modalOptions">
                <!-- Las opciones se cargan aquí con JavaScript -->
            </div>

            <div class="modal-footer">
                <div class="modal-price">
                    Total: <strong id="modalTotalPrice">$0</strong>
                </div>
                <button class="add-to-cart-btn" id="addToCartFromModal">
                    <i class="fab fa-whatsapp"></i> Agregar al Carrito
                </button>
            </div>
        </div>
    </div>

    <!-- CARRITO FLOTANTE -->
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> Mi Pedido</h3>
            <button class="close-cart">&times;</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-total">
            <strong>Total: $<span id="cartTotal">0</span></strong>
        </div>
        <div class="cart-actions">
            <input type="text" id="customerAddress" class="address-input" 
                   placeholder="📍 Tu dirección exacta (calle, número, colonia)">
            <button class="whatsapp-cart" id="whatsappCart">
                <i class="fab fa-whatsapp"></i> Enviar Pedido
            </button>
        </div>
    </div>

    <!-- FAB BUTTON -->
    <button class="fab-cart" id="cartToggle">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
    </button>

    <!-- MODAL DE MENSAJES BONITO -->
    <div class="message-modal" id="messageModal">
        <div class="message-content">
            <div id="messageIcon"></div>
            <h3 id="messageTitle"></h3>
            <p id="messageText"></p>
            <button class="message-btn" id="messageBtn">Aceptar</button>
        </div>
    </div>

    <!-- SCRIPT PRINCIPAL -->
    <script src="script.js"></script>
</body>
</html>
